<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>挪箭头关卡地图编辑器 - Pro</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --grid-color: #333;
            --active-color: #ffeb3b;
            --head-color: #fff;
            --cell-size: 20px;
        }
        body { font-family: sans-serif; background: var(--bg-color); color: #fff; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* 左侧面板 */
        #toolbar { width: 320px; padding: 20px; background: #252525; border-right: 1px solid #444; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .tool-group { border: 1px solid #444; padding: 10px; border-radius: 5px; }
        h3 { margin-top: 0; font-size: 16px; color: #bbb; }
        button { cursor: pointer; padding: 8px; background: #444; color: white; border: none; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #666; }
        button.active { background: #007bff; }
        .dir-btn { width: 45px; height: 45px; font-size: 20px; }
        
        /* 中间画布 */
        #viewport { flex: 1; position: relative; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 40px; background: #111; }
        #grid-container { 
            display: grid; 
            background: var(--grid-color); 
            gap: 1px; 
            border: 2px solid #555;
            user-select: none;
        }
        .cell { width: var(--cell-size); height: var(--cell-size); background: #1a1a1a; position: relative; }
        .cell:hover { background: #2a2a2a; }
        .cell.occupied { background: #444; }
        
        /* 箭头渲染层 */
        .arrow-part { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .arrow-head { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: white; text-shadow: 0 0 2px #000; }
        .arrow-head::after { content: '▲'; position: absolute; }
        .head-U::after { transform: rotate(0deg); }
        .head-R::after { transform: rotate(90deg); }
        .head-D::after { transform: rotate(180deg); }
        .head-L::after { transform: rotate(270deg); }

        /* JSON输出 */
        #json-output { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; font-size: 12px; margin-top: 10px; padding: 5px; box-sizing: border-box; }
        .stats { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div id="toolbar">
    <h2>地图编辑器 v1.0</h2>
    <div class="stats">建议尺寸: 44 x 31</div>
    
    <div class="tool-group">
        <h3>1. 放置头部 (选择方向)</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
            <div style="grid-column: 2"><button class="dir-btn" onclick="setMode('head', 'U')">↑</button></div>
            <button class="dir-btn" onclick="setMode('head', 'L')">←</button>
            <button class="dir-btn" onclick="setMode('head', 'D')">↓</button>
            <button class="dir-btn" onclick="setMode('head', 'R')">→</button>
        </div>
    </div>

    <div class="tool-group">
        <h3>2. 绘制身体</h3>
        <button id="btn-body" style="width: 100%" onclick="setMode('body')">延伸当前身体</button>
        <p class="stats" id="arrow-info">当前长度: 0 | 折弯: 0</p>
    </div>

    <div class="tool-group">
        <h3>操作</h3>
        <button onclick="clearAll()" style="background: #d9534f;">清空全部</button>
        <button onclick="validateLevel()" style="background: #5cb85c;">检查可解性</button>
        <button onclick="exportJSON()">导出 JSON</button>
    </div>

    <div class="tool-group">
        <h3>玩法试玩</h3>
        <button id="btn-start-play" onclick="startPlay()" style="width:100%; background:#6ea8fe;">开始试玩（点击任意一节移动）</button>
        <button id="btn-reset-play" onclick="resetPlay()" style="width:100%; margin-top:8px; background:#444;" disabled>重置试玩</button>
    </div>

    <div class="tool-group">
        <h3>显示</h3>
        <div class="stats" style="margin-bottom: 6px;">方格大小：<span id="cellsize-label">20</span>px</div>
        <input id="cellsize" type="range" min="12" max="40" value="20" style="width: 100%;" />
    </div>

    <div class="tool-group">
        <h3>地图尺寸</h3>
        <div class="stats" style="margin-bottom: 6px;">行 × 列（建议 44 × 31）</div>
        <div style="display:flex; gap:8px; align-items:center;">
            <input id="rows-input" type="number" min="4" value="44" style="width: 100%; padding: 8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;">
            <span class="stats">×</span>
            <input id="cols-input" type="number" min="4" value="31" style="width: 100%; padding: 8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;">
        </div>
        <button onclick="applyMapSizeFromUI()" style="width:100%; margin-top:8px;">应用尺寸（会清空当前编辑）</button>
    </div>

    <div class="tool-group">
        <h3>自动生成关卡（铺满 + 可解）</h3>
        <div class="stats" style="margin-bottom:6px;">
            说明：会清空当前编辑；按“蛇形铺满路径”切分成多条箭头，保证每条箭头头部在边界（因此可解性检查可通过）。
        </div>
        <div class="stats">1) 身体长度候选（逗号分隔，2~30）</div>
        <input id="gen-lens" type="text" value="2,3,4,5,6,7,8,10,12" style="width:100%; padding:8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;">
        <div class="stats" style="margin-top:8px;">2) 头部朝向权重（U,D,L,R）</div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:6px;">
            <input id="wU" type="number" min="0" value="1" style="padding:8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;" title="上">
            <input id="wD" type="number" min="0" value="1" style="padding:8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;" title="下">
            <input id="wL" type="number" min="0" value="4" style="padding:8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;" title="左">
            <input id="wR" type="number" min="0" value="4" style="padding:8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;" title="右">
        </div>
        <div class="stats" style="margin-top:8px;">3) 弯曲次数候选（逗号分隔，0~8）</div>
        <input id="gen-bends" type="text" value="0,0,1,1,2,2,3,4" style="width:100%; padding:8px; background:#111; color:#fff; border:1px solid #444; border-radius:4px;">
        <button onclick="autoGenerateLevel()" style="width:100%; margin-top:10px; background:#6f42c1;">一键生成关卡</button>
        <div class="stats" id="gen-stats" style="margin-top:8px;">-</div>
    </div>

    <textarea id="json-output" readonly placeholder="JSON 数据将显示在这里..."></textarea>
</div>

<div id="viewport">
    <div id="grid-container"></div>
</div>

<script>
    let ROWS = 44;
    let COLS = 31;
    let editMode = 'head'; // head, body, delete
    let currentDir = 'U';
    let arrows = [];
    let activeArrowIndex = -1;
    let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));

    let playMode = false;
    let playBackup = null; // { arrows, grid, activeArrowIndex }

    const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FFB833', '#33FFF3', '#A133FF'];

    // 初始化网格
    const container = document.getElementById('grid-container');
    let cellSize = 20;

    function applyCellSize(size) {
        cellSize = Number(size) || 20;
        document.documentElement.style.setProperty('--cell-size', `${cellSize}px`);
        container.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
        const label = document.getElementById('cellsize-label');
        if (label) label.innerText = String(cellSize);
    }

    function applyMapSize(rows, cols) {
        const r = Math.max(4, Number(rows) || 44);
        const c = Math.max(4, Number(cols) || 31);
        ROWS = r;
        COLS = c;

        // 调整 grid 布局与内部数据（为避免越界，直接清空重建）
        arrows = [];
        activeArrowIndex = -1;
        grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));

        applyCellSize(cellSize);
        initGrid();
        render();
    }

    function applyMapSizeFromUI() {
        const r = document.getElementById('rows-input')?.value;
        const c = document.getElementById('cols-input')?.value;
        applyMapSize(r, c);
    }
    
    applyCellSize(cellSize);
    
    function initGrid() {
        container.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.onclick = () => onCellClick(r, c);
                container.appendChild(cell);
            }
        }
    }

    function setMode(mode, dir) {
        if (playMode) return;
        editMode = mode;
        if (dir) currentDir = dir;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        if (mode === 'body') document.getElementById('btn-body').classList.add('active');
        render();
    }

    function onCellClick(r, c) {
        if (playMode) {
            playMoveByCell(r, c);
            return;
        }
        if (editMode === 'head') {
            if (grid[r][c] !== null) return;
            const newArrow = {
                id: arrows.length,
                head_dir: currentDir,
                path: [{r, c}],
                bends: 0,
                color: colors[arrows.length % colors.length]
            };
            arrows.push(newArrow);
            activeArrowIndex = arrows.length - 1;
            grid[r][c] = activeArrowIndex;
        } 
        else if (editMode === 'body') {
            if (activeArrowIndex === -1) return;
            const arrow = arrows[activeArrowIndex];
            const lastPart = arrow.path[arrow.path.length - 1];
            
            // 必须相邻
            const dr = Math.abs(r - lastPart.r);
            const dc = Math.abs(c - lastPart.c);
            if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                if (grid[r][c] !== null) return;

                // 约束：第二节必须在“头朝向”的反方向一格，保证头部方向与路径物理一致
                if (arrow.path.length === 1) {
                    const head = lastPart; // 此时 lastPart 就是头
                    let behind = null;
                    if (arrow.head_dir === 'U') behind = { r: head.r + 1, c: head.c };
                    else if (arrow.head_dir === 'D') behind = { r: head.r - 1, c: head.c };
                    else if (arrow.head_dir === 'L') behind = { r: head.r, c: head.c + 1 };
                    else if (arrow.head_dir === 'R') behind = { r: head.r, c: head.c - 1 };
                    if (!behind || behind.r !== r || behind.c !== c) {
                        alert(`第二节需要在头朝向反方向一格。head_dir=${arrow.head_dir}，期望(${behind?.r},${behind?.c})。`);
                        return;
                    }
                }

                // 计算折弯数
                let newBends = arrow.bends;
                if (arrow.path.length >= 2) {
                    const prev = arrow.path[arrow.path.length - 2];
                    const currentDirVector = { dr: r - lastPart.r, dc: c - lastPart.c };
                    const lastDirVector = { dr: lastPart.r - prev.r, dc: lastPart.c - prev.c };
                    if (currentDirVector.dr !== lastDirVector.dr || currentDirVector.dc !== lastDirVector.dc) {
                        newBends++;
                    }
                } else {
                    // 第一节身体相对于头的方向，不计入折弯，但可以计算逻辑
                }

                // 文章约束校验
                const newLen = arrow.path.length + 1;
                let allowed = false;
                if (newLen <= 5 && newBends <= 2) allowed = true;
                else if (newLen <= 20 && newBends <= 5) allowed = true;
                else if (newLen <= 30 && newBends <= 8) allowed = true;

                if (!allowed || newLen > 30) {
                    alert("违反公众号约束：长度与折弯比例超限或超过30节！");
                    return;
                }

                arrow.path.push({r, c});
                arrow.bends = newBends;
                grid[r][c] = activeArrowIndex;
            }
        }
        render();
    }

    function render() {
        document.querySelectorAll('.arrow-part').forEach(el => el.remove());
        arrows.forEach((arrow, index) => {
            arrow.path.forEach((pos, i) => {
                const cellIdx = pos.r * COLS + pos.c;
                const cellEl = container.children[cellIdx];
                const part = document.createElement('div');
                part.className = 'arrow-part' + (i === 0 ? ` arrow-head head-${arrow.head_dir}` : '');
                part.style.backgroundColor = arrow.color;
                if (index === activeArrowIndex) part.style.boxShadow = 'inset 0 0 5px #fff';
                cellEl.appendChild(part);
            });
        });
        
        if (activeArrowIndex !== -1) {
            const a = arrows[activeArrowIndex];
            document.getElementById('arrow-info').innerText = `当前长度: ${a.path.length} | 折弯: ${a.bends}`;
        }
    }

    function exportJSON() {
        const data = {
            level_id: 1001,
            grid: { rows: ROWS, cols: COLS },
            arrows: arrows.map(a => ({
                dir: a.head_dir,
                bends: a.bends,
                path: a.path
            }))
        };
        document.getElementById('json-output').value = JSON.stringify(data, null, 2);
    }

    function clearAll() {
        arrows = [];
        activeArrowIndex = -1;
        grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
        render();
    }

    function inBounds(r, c) {
        return r >= 0 && r < ROWS && c >= 0 && c < COLS;
    }

    function dirDelta(d) {
        if (d === 'U') return { dr: -1, dc: 0 };
        if (d === 'D') return { dr: 1, dc: 0 };
        if (d === 'L') return { dr: 0, dc: -1 };
        if (d === 'R') return { dr: 0, dc: 1 };
        return { dr: 0, dc: 1 };
    }

    function startPlay() {
        if (playMode) return;
        if (!arrows.length) {
            alert("没有箭头可试玩。");
            return;
        }
        playBackup = {
            arrows: JSON.parse(JSON.stringify(arrows)),
            grid: JSON.parse(JSON.stringify(grid)),
            activeArrowIndex
        };
        playMode = true;
        document.getElementById('btn-reset-play').disabled = false;
        alert("试玩模式：点击任意一节。若该方向射线到边界均无其他箭头阻挡，则箭头将持续向外移动直到离开地图。");
        render();
    }

    function resetPlay() {
        if (!playBackup) return;
        arrows = JSON.parse(JSON.stringify(playBackup.arrows));
        grid = JSON.parse(JSON.stringify(playBackup.grid));
        activeArrowIndex = playBackup.activeArrowIndex;
        playBackup = null;
        playMode = false;
        document.getElementById('btn-reset-play').disabled = true;
        render();
    }

    function playMoveByCell(r, c) {
        const id = grid[r][c];
        if (id === null) return;
        moveArrowUntilExit(id);
        render();
    }

    function moveArrowUntilExit(id) {
        const arrow = arrows[id];
        if (!arrow || !arrow.path || arrow.path.length === 0) return;

        const head = arrow.path[0];
        const { dr, dc } = dirDelta(arrow.head_dir);

        // 射线检测：从“下一格”开始，直到边界
        let curR = head.r;
        let curC = head.c;
        let blocked = false;
        while (true) {
            curR += dr;
            curC += dc;
            if (!inBounds(curR, curC)) break;
            const occ = grid[curR][curC];
            if (occ !== null && occ !== id) {
                blocked = true;
                break;
            }
        }

        if (blocked) {
            alert("移动失败：该箭头的移动方向被其他箭头阻挡。");
            return;
        }

        // 连续移动：只要头还在地图里，就不断平移
        while (arrow.path && arrow.path.length) {
            const oldPath = arrow.path;
            const oldHead = oldPath[0];
            const nextHead = { r: oldHead.r + dr, c: oldHead.c + dc };

            // 清空旧占用
            for (const p of oldPath) {
                if (inBounds(p.r, p.c)) grid[p.r][p.c] = null;
            }

            // 1步平移后的新路径
            const shifted = [nextHead, ...oldPath.slice(0, -1)];
            arrow.path = shifted.filter(p => inBounds(p.r, p.c));

            // 写回新占用
            for (const p of arrow.path) {
                grid[p.r][p.c] = id;
            }

            if (arrow.path.length === 0) break;
        }
    }

    // ====== 自动生成（铺满 + 可解）======
    function parseNumberList(text, min, max) {
        const parts = String(text || '').split(',').map(s => s.trim()).filter(Boolean);
        const nums = [];
        for (const p of parts) {
            const n = Number(p);
            if (!Number.isFinite(n)) continue;
            const v = Math.floor(n);
            if (v < min || v > max) continue;
            nums.push(v);
        }
        return nums;
    }

    function weightedChoice(items) {
        // items: [{k, w}]
        let total = 0;
        for (const it of items) total += Math.max(0, Number(it.w) || 0);
        if (total <= 0) return items[0]?.k;
        let r = Math.random() * total;
        for (const it of items) {
            r -= Math.max(0, Number(it.w) || 0);
            if (r <= 0) return it.k;
        }
        return items[items.length - 1]?.k;
    }

    function dirBetween(a, b) {
        if (b.r === a.r - 1 && b.c === a.c) return 'U';
        if (b.r === a.r + 1 && b.c === a.c) return 'D';
        if (b.r === a.r && b.c === a.c - 1) return 'L';
        if (b.r === a.r && b.c === a.c + 1) return 'R';
        return 'U';
    }

    function countBendsInPath(path) {
        if (path.length < 3) return 0;
        let bends = 0;
        let prev = dirBetween(path[0], path[1]);
        for (let i = 1; i < path.length - 1; i++) {
            const d = dirBetween(path[i], path[i + 1]);
            if (d !== prev) bends++;
            prev = d;
        }
        return bends;
    }

    function isBoundaryCell(p) {
        return p.r === 0 || p.r === ROWS - 1 || p.c === 0 || p.c === COLS - 1;
    }

    function buildSnakePath(preferVertical) {
        // 提升“弯曲次数”的关键：构造更密的 Hamiltonian path。
        // 当 ROWS 为偶数时，使用“2 行带 zigzag”铺满：在每个 2 行带内强交替上下+左右，使方向变化更频繁。
        // COLS 为偶数时，如 preferVertical 则使用转置后的 2 行带以增强纵向弯曲。

        function buildBandRowPair(cols, rowTop, rowBot, traverseLeftToRight) {
            const band = [];
            if (traverseLeftToRight) {
                for (let col = 0; col < cols; col++) {
                    if (col % 2 === 0) {
                        band.push({ r: rowTop, c: col });
                        band.push({ r: rowBot, c: col });
                    } else {
                        band.push({ r: rowBot, c: col });
                        band.push({ r: rowTop, c: col });
                    }
                }
            } else {
                // 反向遍历时，需要保证第一格落在 rowTop（与上一条带的连接）。
                const startCol = cols - 1;
                const invert = (startCol % 2 === 1);
                for (let col = cols - 1; col >= 0; col--) {
                    if (!invert) {
                        if (col % 2 === 0) {
                            band.push({ r: rowTop, c: col });
                            band.push({ r: rowBot, c: col });
                        } else {
                            band.push({ r: rowBot, c: col });
                            band.push({ r: rowTop, c: col });
                        }
                    } else {
                        // 交换上下顺序，让起点为 rowTop
                        if (col % 2 === 0) {
                            band.push({ r: rowBot, c: col });
                            band.push({ r: rowTop, c: col });
                        } else {
                            band.push({ r: rowTop, c: col });
                            band.push({ r: rowBot, c: col });
                        }
                    }
                }
            }
            return band;
        }

        function buildRowPairPath(rows, cols) {
            // rows 必须为偶数
            const path = [];
            for (let pr = 0; pr < rows; pr += 2) {
                const rTop = pr;
                const rBot = pr + 1;
                const pairIndex = Math.floor(pr / 2);
                const traverseLeftToRight = (pairIndex % 2 === 0);
                path.push(...buildBandRowPair(cols, rTop, rBot, traverseLeftToRight));
            }
            return path;
        }

        // 优先用更“弯曲密”的构造：ROWS 偶数 => row-pair zigzag
        if (ROWS % 2 === 0) {
            // 若 preferVertical 且 COLS 也为偶数，则可以转置以增强纵向弯曲；否则仍用 row-pair
            if (preferVertical && COLS % 2 === 0) {
                // 在转置坐标上构造，再转回
                const swapped = buildRowPairPath(COLS, ROWS); // (r' in [0..COLS-1], c' in [0..ROWS-1])
                // original: (r,c) = (c', r')
                return swapped.map(p => ({ r: p.c, c: p.r }));
            }
            return buildRowPairPath(ROWS, COLS);
        }

        // 次选：COLS 偶数时，用转置 row-pair（让列变成偶数）
        if (COLS % 2 === 0) {
            const swapped = buildRowPairPath(COLS, ROWS);
            return swapped.map(p => ({ r: p.c, c: p.r }));
        }

        // 双维均为奇数：退化到原始蛇形（弯曲会少一些，但能工作）
        const path = [];
        for (let r = 0; r < ROWS; r++) {
            if (r % 2 === 0) {
                for (let c = 0; c < COLS; c++) path.push({ r, c });
            } else {
                for (let c = COLS - 1; c >= 0; c--) path.push({ r, c });
            }
        }
        return path;
    }

    function autoGenerateLevel() {
        const lens = parseNumberList(document.getElementById('gen-lens')?.value, 2, 30);
        const bendsOpt = parseNumberList(document.getElementById('gen-bends')?.value, 0, 8);
        const wU = Number(document.getElementById('wU')?.value || 0);
        const wD = Number(document.getElementById('wD')?.value || 0);
        const wL = Number(document.getElementById('wL')?.value || 0);
        const wR = Number(document.getElementById('wR')?.value || 0);

        if (!lens.length) { alert('请填写有效的长度候选（2~30）。'); return; }
        if (!bendsOpt.length) { alert('请填写有效的弯曲次数候选（0~8）。'); return; }

        clearAll();

        const dirWeights = [
            { k: 'U', w: wU },
            { k: 'D', w: wD },
            { k: 'L', w: wL },
            { k: 'R', w: wR },
        ];

        function outwardDirsForCell(p) {
            const outs = [];
            if (p.r === 0) outs.push('U');
            if (p.r === ROWS - 1) outs.push('D');
            if (p.c === 0) outs.push('L');
            if (p.c === COLS - 1) outs.push('R');
            return outs;
        }

        function oppositeDir(d) {
            if (d === 'U') return 'D';
            if (d === 'D') return 'U';
            if (d === 'L') return 'R';
            if (d === 'R') return 'L';
            return 'U';
        }

        function maxBendsForLen(L) {
            if (L <= 5) return 2;
            if (L <= 20) return 5;
            return 8;
        }

        function sampleLen() { return lens[Math.floor(Math.random() * lens.length)]; }
        function sampleBends() { return bendsOpt[Math.floor(Math.random() * bendsOpt.length)]; }
        function sampleDesiredHeadDir() {
            // 允许权重全 0：weightedChoice 会退化为第一个 k
            return weightedChoice(dirWeights);
        }

        const preferVertical = (wU + wD) > (wL + wR);
        const snake = buildSnakePath(preferVertical);

        const N = snake.length;
        if (N !== ROWS * COLS) {
            alert(`内部错误：snake 长度 ${N} != ${ROWS}*${COLS}。`);
            return;
        }

        // dp[i]：从索引 i 开始（i 必须是边界格子）能否铺满到结尾
        const isBoundary = Array(N + 1).fill(false);
        for (let i = 0; i < N; i++) isBoundary[i] = isBoundaryCell(snake[i]);
        const dp = Array(N + 1).fill(false);
        dp[N] = true;
        for (let i = N - 1; i >= 0; i--) {
            if (!isBoundary[i]) continue;
            const maxNext = Math.min(N, i + 30);
            for (let next = i + 2; next <= maxNext; next++) {
                if (next === N || isBoundary[next]) {
                    if (dp[next]) { dp[i] = true; break; }
                }
            }
        }

        if (!dp[0]) {
            alert("自动生成失败：无法在当前地图尺寸下按约束铺满。请尝试调整长度候选或地图尺寸。");
            return;
        }

        let i = 0;
        while (i < N) {
            const desiredLen = sampleLen();
            const desiredB = sampleBends();
            const desiredHeadDir = sampleDesiredHeadDir();

            let bestNext = -1;
            let bestCost = Infinity;

            const maxNext = Math.min(N, i + 30);
            for (let next = i + 2; next <= maxNext; next++) {
                if (!(next === N || isBoundary[next])) continue;
                if (!dp[next]) continue;

                const seg = snake.slice(i, next);
                const L = seg.length;
                if (L < 2 || L > 30) continue;

                const bends = countBendsInPath(seg);
                const head = seg[0];

                const maxB = maxBendsForLen(L);
                if (bends > maxB) continue;

                // head_dir 必须和路径形状匹配：第二格相对头的方向 -> 头朝相反方向走
                const d0 = dirBetween(seg[0], seg[1]); // head -> second
                const headDir = oppositeDir(d0);
                const outs = outwardDirsForCell(head);
                if (!outs.includes(headDir)) continue; // 保证射线朝外必可移除

                const dirCost = (headDir === desiredHeadDir) ? 0 : 20;
                const cost = Math.abs(L - desiredLen) * 2 + Math.abs(bends - desiredB) * 5 + dirCost;

                if (cost < bestCost) {
                    bestCost = cost;
                    bestNext = next;
                }
                if (bestCost === 0) break;
            }

            // 兜底：如果严格约束下找不到，放宽 bends 约束（但仍保持射线朝外）
            if (bestNext === -1) {
                for (let next = i + 2; next <= maxNext; next++) {
                    if (!(next === N || isBoundary[next])) continue;
                    if (!dp[next]) continue;

                    const seg = snake.slice(i, next);
                    const L = seg.length;
                    const bends = countBendsInPath(seg);
                    const head = seg[0];

                    const d0 = dirBetween(seg[0], seg[1]);
                    const headDir = oppositeDir(d0);
                    const outs = outwardDirsForCell(head);
                    if (!outs.includes(headDir)) continue;
                    if (bends > 8) continue;

                    // 随便取一个可用的最小偏差
                    const cost = Math.abs(L - desiredLen) * 2 + Math.abs(bends - desiredB) * 5 + (headDir === desiredHeadDir ? 0 : 20);
                    if (cost < bestCost) {
                        bestCost = cost;
                        bestNext = next;
                    }
                    if (bestCost === 0) break;
                }
            }

            if (bestNext === -1) {
                alert("自动生成失败：在铺满时段内找不到满足约束的分段。请调整长度/折弯候选或地图尺寸。");
                return;
            }

            const seg = snake.slice(i, bestNext);
            const L = seg.length;
            const bends = countBendsInPath(seg);
            const head = seg[0];
            const d0 = dirBetween(seg[0], seg[1]);
            const headDir = oppositeDir(d0);

            const path = seg.map(p => ({ r: p.r, c: p.c }));
            const newArrow = {
                id: arrows.length,
                head_dir: headDir,
                path,
                bends,
                color: colors[arrows.length % colors.length]
            };
            arrows.push(newArrow);
            const ai = arrows.length - 1;
            for (const p of path) grid[p.r][p.c] = ai;

            i = bestNext; // 下一段从 next 开始（next 为下一条箭头的 head）
        }

        activeArrowIndex = arrows.length - 1;
        render();

        const statsEl = document.getElementById('gen-stats');
        if (statsEl) {
            const totalLen = arrows.reduce((s, a) => s + a.path.length, 0);
            const avgLen = arrows.length ? (totalLen / arrows.length).toFixed(2) : '0';
            const avgB = arrows.length ? (arrows.reduce((s, x) => s + x.bends, 0) / arrows.length).toFixed(2) : '0';
            statsEl.innerText = `生成完成：箭头数 ${arrows.length} | 平均长度 ${avgLen} | 平均折弯 ${avgB} | 覆盖格子 ${ROWS * COLS}`;
        }
    }

    function validateLevel() {
        // 简易解法模拟
        let tempArrows = JSON.parse(JSON.stringify(arrows));
        let tempGrid = JSON.parse(JSON.stringify(grid));
        let changed = true;
        let removedCount = 0;

        while (changed) {
            changed = false;
            for (let i = tempArrows.length - 1; i >= 0; i--) {
                const arrow = tempArrows[i];
                if (!arrow) continue;
                if (!arrow.path || arrow.path.length === 0) continue;

                const head = arrow.path[0];
                let blocked = false;
                let curR = head.r, curC = head.c;
                const dir = arrow.head_dir; // 修复：字段名是 head_dir，不是 dir
                if (!dir) {
                    // 避免方向缺失导致死循环
                    blocked = true;
                }
                
                // 射线检测
                while (true) {
                    if (blocked) break;
                    if (dir === 'U') curR--;
                    else if (dir === 'D') curR++;
                    else if (dir === 'L') curC--;
                    else if (dir === 'R') curC++;
                    else { blocked = true; break; }

                    if (curR < 0 || curR >= ROWS || curC < 0 || curC >= COLS) break;
                    if (tempGrid[curR][curC] !== null && tempGrid[curR][curC] !== i) {
                        blocked = true;
                        break;
                    }
                }

                if (!blocked) {
                    // 移除逻辑
                    arrow.path.forEach(p => tempGrid[p.r][p.c] = null);
                    tempArrows[i] = null;
                    removedCount++;
                    changed = true;
                }
            }
        }

        if (removedCount === arrows.length) alert("✅ 验证成功：关卡 100% 可解！");
        else alert(`❌ 验证失败：剩下 ${arrows.length - removedCount} 个箭头互相卡死。`);
    }

    initGrid();

    // UI: 调整方格大小
    const cellSizeInput = document.getElementById('cellsize');
    if (cellSizeInput) {
        cellSizeInput.addEventListener('input', (e) => applyCellSize(e.target.value));
        cellSizeInput.addEventListener('change', (e) => applyCellSize(e.target.value));
    }

    // UI: 初始化地图尺寸输入框
    const rowsInput = document.getElementById('rows-input');
    const colsInput = document.getElementById('cols-input');
    if (rowsInput) rowsInput.value = String(ROWS);
    if (colsInput) colsInput.value = String(COLS);
</script>
</body>
