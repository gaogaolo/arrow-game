<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>挪箭头 - 满屏高密度 & 可试玩版</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --grid-line: #1c1c28;
            --panel-bg: #151620;
            --text-color: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; user-select: none;
        }
        .controls {
            background: var(--panel-bg); padding: 15px 25px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; gap: 15px;
            align-items: center; margin-bottom: 20px; border: 1px solid #333; flex-wrap: wrap;
        }
        input[type="number"] { width: 50px; padding: 5px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; text-align: center; }
        button {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-gen { background: #ff007f; color: white; box-shadow: 0 0 10px rgba(255, 0, 127, 0.4); }
        .btn-gen:hover { background: #ff3399; box-shadow: 0 0 15px rgba(255, 0, 127, 0.8); }
        .btn-auto { background: #00e5ff; color: #000; box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
        .btn-auto:hover { background: #33ebff; }
        #log { font-size: 14px; font-weight: bold; min-width: 200px; }

        #game-board {
            position: relative;
            background-color: var(--grid-line);
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden; /* 防止飞出动画撑开页面 */
        }
        
        .arrow-group {
            position: absolute;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s;
            cursor: pointer;
        }
        .arrow-group:hover .part { filter: brightness(1.3); }
        
        .part {
            position: absolute;
            width: 38px; height: 38px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
        }
        .head-icon {
            width: 0; height: 0; 
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 16px solid #fff;
        }
        
        /* 错误点击的震动动画 */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.3s; filter: grayscale(0.5); }
    </style>
</head>
<body>

    <div class="controls">
        <label>地图行数: <input type="number" id="input-rows" value="10" min="5" max="25"></label>
        <label>地图列数: <input type="number" id="input-cols" value="10" min="5" max="25"></label>
        <button class="btn-gen" onclick="startGeneration()">🚀 生成满屏关卡</button>
        <button class="btn-auto" onclick="autoSolve()">🤖 机器自动求解</button>
        <div id="log" style="color: #ffcc00;">点击生成开始...</div>
    </div>

    <div id="game-board"></div>

<script>
    const NEON_COLORS = ['#ff0055', '#00e5ff', '#a600ff', '#ffaa00', '#00ff66'];
    const CELL_SIZE = 40; // 每个格子 40px
    let currentArrows = [];
    let gridMap = [];
    let rows = 10, cols = 10;
    let isPlaying = false;
    let autoSolveInterval = null;

    const logEl = document.getElementById('log');
    const boardEl = document.getElementById('game-board');

    // ==========================================
    // 核心生成算法 (DAG依赖图法)
    // ==========================================
    function startGeneration() {
        clearInterval(autoSolveInterval);
        isPlaying = false;
        rows = parseInt(document.getElementById('input-rows').value);
        cols = parseInt(document.getElementById('input-cols').value);
        
        boardEl.style.width = `${cols * CELL_SIZE}px`;
        boardEl.style.height = `${rows * CELL_SIZE}px`;
        boardEl.innerHTML = '';
        logEl.style.color = '#ffcc00';
        logEl.innerText = '正在计算致密填充与防死锁...';

        setTimeout(() => {
            generateLogic();
            renderBoard();
            isPlaying = true;
            logEl.style.color = '#00ff66';
            logEl.innerText = `✅ 生成完毕！请点击箭头进行消除试玩。`;
        }, 50);
    }

    function generateLogic() {
        gridMap = Array.from({length: rows}, () => Array(cols).fill(null));
        currentArrows = [];
        let adjList = {}; // 依赖图：adj[A] = [B] 表示 A 必须在 B 之前消除 (A挡住了B)

        // 1. 获取所有空格子，并按到边缘的距离排序 (从外往内生成)
        let emptyCells = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                let dist = Math.min(r, rows - 1 - r, c, cols - 1 - c);
                emptyCells.push({r, c, dist});
            }
        }
        emptyCells.sort((a, b) => a.dist - b.dist);

        // 2. 开始填充
        while (emptyCells.length > 0) {
            let start = emptyCells.shift();
            if (gridMap[start.r][start.c] !== null) continue; // 已被之前的身体占用的跳过

            let placed = false;
            // 优先尝试长箭头 (长度 4 到 1)
            for (let maxLen = 4; maxLen >= 1; maxLen--) {
                if (placed) break;
                
                let paths = getPaths(start.r, start.c, maxLen, gridMap);
                paths.sort(() => Math.random() - 0.5); // 打乱路径

                for (let path of paths) {
                    if (placed) break;
                    let dirs = ['U', 'D', 'L', 'R'].sort(() => Math.random() - 0.5);
                    
                    for (let dir of dirs) {
                        let ray = getRay(path[0].r, path[0].c, dir);
                        
                        // 规则 1：第一个箭头方向必须畅通无阻
                        if (currentArrows.length === 0 && ray.some(c => gridMap[c.r][c.c] !== null)) continue;
                        
                        // 规则 2：不能阻挡自己的路线
                        if (ray.some(rCell => path.some(pCell => pCell.r === rCell.r && pCell.c === rCell.c))) continue;

                        let newId = currentArrows.length;
                        let tempAdj = JSON.parse(JSON.stringify(adjList));
                        tempAdj[newId] = [];

                        // 建立依赖关系并检测死锁
                        let conflict = false;

                        // (A) 新箭头被谁挡住了？(新箭头的射线上有老箭头)
                        for (let cell of ray) {
                            let oldId = gridMap[cell.r][cell.c];
                            if (oldId !== null) {
                                // 老箭头必须先消除 -> oldId 挡住 newId
                                if (!tempAdj[oldId]) tempAdj[oldId] = [];
                                if (!tempAdj[oldId].includes(newId)) tempAdj[oldId].push(newId);
                            }
                        }

                        // (B) 新箭头挡住了谁？(新箭头的身体踩在了老箭头的射线上)
                        for (let oldArrow of currentArrows) {
                            let blocked = false;
                            for (let rCell of oldArrow.ray) {
                                if (path.some(pCell => pCell.r === rCell.r && pCell.c === rCell.c)) {
                                    blocked = true; break;
                                }
                            }
                            if (blocked) {
                                // 新箭头必须先消除 -> newId 挡住 oldId
                                if (!tempAdj[newId].includes(oldArrow.id)) tempAdj[newId].push(oldArrow.id);
                            }
                        }

                        // 规则 5：检查依赖图是否有环 (死锁预判)
                        if (!hasCycle(tempAdj, newId + 1)) {
                            // 校验通过，放置箭头！
                            adjList = tempAdj;
                            let arrow = {
                                id: newId, dir: dir, path: path, ray: ray,
                                color: NEON_COLORS[newId % NEON_COLORS.length]
                            };
                            currentArrows.push(arrow);
                            for (let p of path) gridMap[p.r][p.c] = newId;
                            placed = true;
                            break;
                        }
                    }
                }
            }
            // 如果长度1都放不下(极罕见)，就留空，不影响大局
        }
    }

    // ==========================================
    // 辅助函数
    // ==========================================
    // 获取指定长度的随机连续空格子路径 (DFS)
    function getPaths(r, c, targetLen, grid) {
        let results = [];
        function dfs(cr, cc, currentPath) {
            if (currentPath.length === targetLen) {
                results.push([...currentPath]);
                return;
            }
            let neighbors = [ {r:cr-1, c:cc}, {r:cr+1, c:cc}, {r:cr, c:cc-1}, {r:cr, c:cc+1} ];
            for (let n of neighbors) {
                if (n.r>=0 && n.r<rows && n.c>=0 && n.c<cols && grid[n.r][n.c]===null) {
                    if (!currentPath.some(p => p.r===n.r && p.c===n.c)) {
                        currentPath.push(n);
                        dfs(n.r, n.c, currentPath);
                        currentPath.pop();
                    }
                }
            }
            // 如果无路可走但也算一条有效短路径
            if(currentPath.length >= 1 && currentPath.length < targetLen) results.push([...currentPath]);
        }
        dfs(r, c, [{r, c}]);
        // 过滤重复和取最长的
        return results.sort((a, b) => b.length - a.length).slice(0, 5); 
    }

    // 获取射线上所有坐标
    function getRay(r, c, dir) {
        let ray = [];
        let cr = r, cc = c;
        while (true) {
            if (dir === 'U') cr--; if (dir === 'D') cr++;
            if (dir === 'L') cc--; if (dir === 'R') cc++;
            if (cr < 0 || cr >= rows || cc < 0 || cc >= cols) break;
            ray.push({r: cr, c: cc});
        }
        return ray;
    }

    // 拓扑排序检测有向图是否有环
    function hasCycle(adj, numNodes) {
        let visited = new Array(numNodes).fill(0);
        for (let i = 0; i < numNodes; i++) {
            if (visited[i] === 0) {
                if (dfsCheck(i)) return true;
            }
        }
        function dfsCheck(node) {
            visited[node] = 1;
            for (let neighbor of (adj[node] || [])) {
                if (visited[neighbor] === 1) return true; // 发现环
                if (visited[neighbor] === 0 && dfsCheck(neighbor)) return true;
            }
            visited[node] = 2;
            return false;
        }
        return false;
    }

    // ==========================================
    // 渲染与交互逻辑 (手动试玩)
    // ==========================================
    function renderBoard() {
        currentArrows.forEach(arrow => {
            let group = document.createElement('div');
            group.className = 'arrow-group';
            group.id = `arrow-${arrow.id}`;
            // 让组的定位基于它的头部
            group.style.left = '0px'; 
            group.style.top = '0px';

            arrow.path.forEach((p, idx) => {
                let part = document.createElement('div');
                part.className = 'part';
                part.style.left = `${p.c * CELL_SIZE}px`;
                part.style.top = `${p.r * CELL_SIZE}px`;
                part.style.backgroundColor = arrow.color;
                part.style.boxShadow = `0 0 10px ${arrow.color}88`;

                if (idx === 0) { // 头部
                    let head = document.createElement('div');
                    head.className = 'head-icon';
                    if(arrow.dir === 'U') head.style.transform = 'rotate(0deg)';
                    if(arrow.dir === 'D') head.style.transform = 'rotate(180deg)';
                    if(arrow.dir === 'L') head.style.transform = 'rotate(-90deg)';
                    if(arrow.dir === 'R') head.style.transform = 'rotate(90deg)';
                    part.appendChild(head);
                }
                group.appendChild(part);
            });

            // 绑定点击试玩事件
            group.onclick = () => tryRemoveArrow(arrow);
            boardEl.appendChild(group);
        });
    }

    function tryRemoveArrow(arrow) {
        if (!isPlaying) return;
        
        // 实时检测射线方向是否被挡住
        let isBlocked = false;
        for (let cell of arrow.ray) {
            let occupantId = gridMap[cell.r][cell.c];
            if (occupantId !== null && occupantId !== arrow.id) {
                isBlocked = true;
                break;
            }
        }

        const el = document.getElementById(`arrow-${arrow.id}`);
        if (isBlocked) {
            // 被挡住了，播放错误动画
            el.classList.remove('shake');
            void el.offsetWidth; // 触发重绘
            el.classList.add('shake');
        } else {
            // 成功消除：更新数据逻辑层
            arrow.path.forEach(p => gridMap[p.r][p.c] = null);
            currentArrows = currentArrows.filter(a => a.id !== arrow.id);
            
            // 飞出动画
            let flyDist = Math.max(rows, cols) * CELL_SIZE;
            let tx = 0, ty = 0;
            if(arrow.dir === 'U') ty = -flyDist;
            if(arrow.dir === 'D') ty = flyDist;
            if(arrow.dir === 'L') tx = -flyDist;
            if(arrow.dir === 'R') tx = flyDist;
            
            el.style.transform = `translate(${tx}px, ${ty}px)`;
            el.style.opacity = '0';
            
            setTimeout(() => { if (el.parentNode) el.remove(); }, 300);

            // 胜利判定
            if (currentArrows.length === 0) {
                logEl.style.color = '#00ffcc';
                logEl.innerText = "🎉 完美通关！地图已清空。";
                isPlaying = false;
            }
        }
    }

    // 机器人演示
    function autoSolve() {
        if (!isPlaying || currentArrows.length === 0) return;
        isPlaying = false; // 禁用手动
        logEl.style.color = '#33ebff';
        logEl.innerText = "🤖 机器人接管消除中...";

        autoSolveInterval = setInterval(() => {
            if (currentArrows.length === 0) {
                clearInterval(autoSolveInterval);
                logEl.style.color = '#00ffcc';
                logEl.innerText = "🎉 机器人已清空全场！";
                return;
            }
            // 找出一个可以走的箭头
            let found = false;
            for (let arrow of currentArrows) {
                let blocked = arrow.ray.some(cell => gridMap[cell.r][cell.c] !== null && gridMap[cell.r][cell.c] !== arrow.id);
                if (!blocked) {
                    isPlaying = true; // 临时开启以便调用复用逻辑
                    tryRemoveArrow(arrow);
                    isPlaying = false;
                    found = true;
                    break;
                }
            }
            if (!found) {
                clearInterval(autoSolveInterval);
                logEl.innerText = "❌ 发生逻辑异常，死锁了！";
            }
        }, 200); // 每0.2秒消一个
    }

    // 初始运行
    startGeneration();
</script>

</body>
</html>
