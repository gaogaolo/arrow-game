<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>挪箭头 - 全功能开发版</title>
    <link rel="stylesheet" href="test7.css">
</head>
<body>

    <div class="controls">
        <label>R: <input type="number" id="input-rows" value="10"></label>
        <label>C: <input type="number" id="input-cols" value="10"></label>
        <label>关卡序号: <input type="number" id="input-level-id" value="1" min="1" style="width:60px;"></label>
        <label>长度权重: <input type="text" id="input-length-weights" value="1:8,2:20,3:30,4:24,5:12,6:6" style="width:240px;text-align:left;"></label>
        <label>弯折权重: <input type="text" id="input-bend-weights" value="0:40,1:35,2:20,3:5" style="width:180px;text-align:left;"></label>
        <button class="btn-reset" onclick="resetBoard()">🧹 重置</button>
        <button class="btn-block" id="btn-block-mode" onclick="toggleBlockMode()">🚫 选择禁区</button>
        <button class="btn-clear-block" onclick="clearBlockedCells()">🗑️ 清除禁区</button>
        <button class="btn-gen" onclick="fillFullMap()">🚀 自动铺满全图</button>
        <button class="btn-add" onclick="addSingleArrow()">➕ 随机加一根</button>
        <button class="btn-auto" onclick="autoSolve()">🤖 自动演示</button>
        <button class="btn-export" onclick="exportLevel()">📤 导出JSON</button>
        <button class="btn-import" onclick="showImportModal()">📥 导入JSON</button>
        <input type="file" id="json-upload" accept=".json,application/json" style="display:none" onchange="handleJsonUpload(event)">
        <button class="btn-verify" onclick="verifyLevel()">🔍 关卡可解性校验</button>
        <button class="btn-draw" id="btn-draw-mode" onclick="toggleDrawMode()">✏️ 手动绘制</button>
        <select id="draw-direction" class="dir-select">
            <option value="U">↑ 向上</option>
            <option value="D">↓ 向下</option>
            <option value="L">← 向左</option>
            <option value="R">→ 向右</option>
        </select>
        <button class="btn-shape" id="btn-shape-mode" onclick="toggleShapeMode()">🎨 形状生成</button>
        <input type="file" id="svg-upload" accept=".svg,image/svg+xml" style="display:none" onchange="handleSvgUpload(event)">
        <div id="log">就绪</div>
    </div>
    
    <!-- 形状生成面板 -->
    <div id="shape-panel" class="shape-panel" style="display:none;">
        <div class="shape-panel-content">
            <h3>🎨 形状关卡生成器</h3>
            <div class="shape-input-row">
                <label>输入文字/Emoji:</label>
                <input type="text" id="shape-text" placeholder="例如: ❤️ 或 ABC" maxlength="10" style="width:150px;">
                <button onclick="generateFromText()">生成</button>
            </div>
            <div class="shape-input-row">
                <label>或上传SVG:</label>
                <button onclick="document.getElementById('svg-upload').click()">📁 选择SVG文件</button>
            </div>
            <div class="shape-input-row">
                <label>或粘贴SVG代码:</label>
                <textarea id="svg-code-input" placeholder="直接粘贴SVG代码..." style="width:200px;height:60px;resize:vertical;font-size:11px;"></textarea>
                <button onclick="generateFromSvgCode()">生成</button>
            </div>
            <div class="shape-input-row">
                <label>形状名称:</label>
                <input type="text" id="shape-name" placeholder="可选，用于导出" style="width:150px;">
            </div>
            <div class="shape-preview">
                <label>预览:</label>
                <canvas id="shape-preview-canvas" width="200" height="200"></canvas>
            </div>
            <div class="shape-actions">
                <button class="btn-apply" onclick="applyShapeMask()">✅ 应用形状生成关卡</button>
                <button class="btn-cancel" onclick="toggleShapeMode()">❌ 取消</button>
            </div>
        </div>
    </div>

    <div id="game-board"></div>

<script src="test7.js"></script>
</body>
</html>
